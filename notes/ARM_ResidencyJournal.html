<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anorectal Malformation — SIH Residency Journal</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Overpass:wght@400;600;700;900&family=Overpass+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --paper:#f7f3ec;--ink:#1a1410;--deep:#2b1810;
  --acc:#a31515;--gold:#b8922a;--tab-bg:#3b2314;
  --border:#d5c8b0;--muted:#6b5a48;--rule:rgba(180,165,140,0.17);
}
body{background:#7a7060;font-family:'Overpass',sans-serif;padding:2rem 0;
     display:flex;flex-direction:column;align-items:center;gap:1.5rem;}
.page{width:210mm;height:297mm;background:var(--paper);display:flex;flex-direction:column;
      box-shadow:2px 2px 0 #5a5040,5px 5px 0 #4a4030,0 20px 60px rgba(0,0,0,.45);
      border:1px solid var(--border);overflow:hidden;}
.tabs{display:flex;height:8mm;flex-shrink:0;}
.tab{flex:1;display:flex;align-items:center;justify-content:center;font-size:.54rem;
     font-weight:700;letter-spacing:.12em;text-transform:uppercase;
     font-family:'Overpass Mono',monospace;border-right:1px solid rgba(255,255,255,.07);}
.tab.on{background:var(--tab-bg);color:var(--gold);border-bottom:3px solid var(--gold);}
.tab.off{background:rgba(43,24,16,.72);color:rgba(255,255,255,.3);border-bottom:3px solid transparent;}
.hdr{background:var(--deep);padding:4.5mm 9mm 4mm;display:flex;align-items:center;
     justify-content:space-between;border-bottom:2.5px solid var(--gold);flex-shrink:0;}
.hdr h1{font-family:'EB Garamond',serif;font-size:1.55rem;font-weight:700;color:#fff;line-height:1;}
.hsub{font-size:.62rem;color:rgba(255,255,255,.46);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
.hdr-logo{width:48px;height:48px;border-radius:50%;border:2.5px solid var(--gold);
          overflow:hidden;flex-shrink:0;margin-right:11px;box-shadow:0 0 10px rgba(184,146,42,.28);}
.hdr-logo img{width:100%;height:100%;object-fit:cover;}
.hdr-meta{font-size:.6rem;color:rgba(255,255,255,.38);font-family:'Overpass Mono',monospace;
          text-align:right;line-height:1.6;}
.cont-hdr{background:var(--deep);padding:3mm 9mm;display:flex;align-items:center;
          justify-content:space-between;border-bottom:2px solid var(--gold);flex-shrink:0;}
.cont-hdr h2{font-family:'EB Garamond',serif;font-size:1.05rem;font-weight:700;color:#fff;}
.cont-hdr .pg{font-size:.6rem;color:var(--gold);font-family:'Overpass Mono',monospace;}
.body{flex:1;padding:5mm 9mm;overflow:hidden;
      background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 21px,
        var(--rule) 21px,var(--rule) 22px);background-position:0 0;}
.brutal{background:var(--tab-bg);border-left:5px solid var(--gold);padding:7px 11px;
        margin-bottom:5mm;border-radius:0 4px 4px 0;}
.brutal .lbl{font-size:.57rem;letter-spacing:.15em;color:var(--gold);font-weight:700;
             text-transform:uppercase;margin-bottom:2px;font-family:'Overpass Mono',monospace;}
.brutal .rule{font-family:'EB Garamond',serif;font-size:1.05rem;font-weight:700;
              color:#fff;font-style:italic;line-height:1.35;}
.brutal .sub{font-size:.71rem;color:rgba(255,255,255,.73);line-height:1.45;margin-top:3px;}
.sh{display:flex;align-items:center;gap:5px;margin-bottom:2mm;margin-top:5mm;}
.sh:first-child{margin-top:0;}
.sh .n{background:var(--acc);color:#fff;font-family:'Overpass Mono',monospace;
       font-size:.57rem;padding:2px 5px;border-radius:2px;flex-shrink:0;}
.sh h3{font-family:'EB Garamond',serif;font-size:.97rem;font-weight:700;
       color:var(--deep);border-bottom:1.5px solid var(--gold);flex:1;padding-bottom:1px;}
.desc{font-family:'EB Garamond',serif;font-size:.82rem;color:#3a3020;line-height:1.55;
      margin-bottom:2.5mm;padding:4px 8px;border-left:2.5px solid var(--gold);
      background:rgba(184,146,42,.055);font-style:italic;}
.desc strong{font-style:normal;color:var(--deep);font-weight:700;}
.desc em{font-style:italic;color:var(--acc);}
table{width:100%;border-collapse:collapse;margin-bottom:3mm;font-size:.71rem;}
th{background:var(--deep);color:rgba(255,255,255,.92);padding:4px 8px;text-align:left;
   font-size:.61rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;}
td{padding:4.5px 8px;border-bottom:1px solid rgba(195,180,155,.38);
   vertical-align:top;line-height:1.43;color:var(--ink);}
tr:nth-child(even) td{background:rgba(43,24,16,.028);}
td strong{color:var(--acc);font-weight:700;}
td em{font-style:italic;color:var(--muted);}
td b{color:var(--deep);font-weight:700;}
.hi{color:var(--acc);font-weight:700;font-family:'Overpass Mono',monospace;font-size:.67rem;}
.ok{color:#1a5c1a;font-weight:600;}
.bad{color:var(--acc);font-weight:700;}
.warn-td{color:#7a4000;font-weight:600;}
.note{border-left:3px solid var(--gold);background:rgba(184,146,42,.07);padding:4px 9px;
      margin-bottom:3mm;font-size:.71rem;line-height:1.43;border-radius:0 2px 2px 0;color:var(--ink);}
.note strong{color:var(--deep);font-weight:700;}
.note em{font-style:italic;color:var(--acc);}
.warnbox{border-left:3px solid var(--acc);background:rgba(163,21,21,.05);padding:5px 9px;
         margin-bottom:3mm;font-size:.71rem;border-radius:0 2px 2px 0;}
.warnbox .wh{font-size:.59rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;
             color:var(--acc);margin-bottom:2px;font-family:'Overpass Mono',monospace;}
ul.nb{list-style:none;padding:0;margin:0 0 3mm 0;}
ul.nb li{padding:2px 0 2px 14px;font-size:.73rem;line-height:1.43;position:relative;color:var(--ink);}
ul.nb li::before{content:'◆';position:absolute;left:1px;color:var(--acc);font-size:.42rem;top:5px;}
ul.nb li strong{color:var(--acc);font-weight:700;}
ul.nb li em{font-style:italic;color:var(--muted);}
ul.nb li b{color:var(--deep);font-weight:700;}
ol.steps{list-style:none;padding:0;margin:0 0 3mm 0;counter-reset:s;}
ol.steps li{counter-increment:s;padding:3px 0 3px 22px;font-size:.73rem;line-height:1.43;
            position:relative;color:var(--ink);border-bottom:1px solid rgba(195,180,155,.25);}
ol.steps li::before{content:counter(s);position:absolute;left:2px;top:5px;background:var(--deep);
                    color:var(--gold);font-size:.57rem;width:13px;height:13px;border-radius:2px;
                    display:flex;align-items:center;justify-content:center;
                    font-family:'Overpass Mono',monospace;}
ol.steps li strong{color:var(--acc);font-weight:700;}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:5mm;}
.badge{display:inline-block;background:var(--acc);color:#fff;font-size:.57rem;font-weight:600;
       padding:1px 5px;border-radius:2px;vertical-align:middle;margin-right:2px;}
.badge-g{display:inline-block;background:var(--gold);color:var(--deep);font-size:.57rem;
         font-weight:700;padding:1px 5px;border-radius:2px;vertical-align:middle;margin-right:2px;}
.divider{border:none;border-top:1px dashed rgba(184,146,42,.35);margin:3mm 0;}
.foot{background:var(--deep);padding:2.5mm 9mm;display:flex;justify-content:space-between;
      font-size:.57rem;color:rgba(255,255,255,.42);letter-spacing:.07em;text-transform:uppercase;
      font-family:'Overpass Mono',monospace;flex-shrink:0;border-top:2px solid var(--gold);
      margin-top:auto;}
.foot span:nth-child(2){color:var(--gold);}
@media print{
  body{background:none;padding:0;}
  .page{box-shadow:none;page-break-after:always;}
  .no-print{display:none!important;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
}
@media(max-width:768px){
  body{background:#f7f3ec;padding:0;display:block;}
  .page{width:100%!important;height:auto!important;min-height:0!important;padding:14px!important;
        box-shadow:none!important;border:none!important;border-radius:0!important;
        margin:0!important;page-break-after:auto!important;}
  .body{overflow:visible!important;flex:none!important;}
  .cols{grid-template-columns:1fr!important;}
  table{font-size:11px!important;display:block;overflow-x:auto;white-space:nowrap;}
  th,td{padding:5px 8px!important;font-size:11px!important;}
  .tabs{overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
  .tab{font-size:9px!important;padding:6px 10px!important;}
  h1,.title{font-size:1.1rem!important;}
  .foot{margin-top:16px!important;}
  .brutal .rule{font-size:.78rem!important;}
  li{font-size:.78rem!important;}
}
</style>
</head>
<body>
