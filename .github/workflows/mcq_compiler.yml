name: MCQ Arena Multi-LLM Sanitizer & Compiler

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  compile_and_process_mcqs:
    runs-on: ubuntu-latest
    env:
      OUTPUT_FILE: master_mcq_arena.json
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Resilient Multi-LLM Pipeline Script
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python - <<'EOF'
          import glob
          import json
          import os
          import re
          import sys
          from pathlib import Path

          import requests


          OUTPUT_FILE = Path(os.getenv("OUTPUT_FILE", "master_mcq_arena.json"))
          LLM_TIMEOUT_SECONDS = 45
          CHUNK_SIZE = 50


          def load_and_sanitize_mcqs():
              compiled_questions = []
              seen = set()
              file_paths = sorted(glob.glob("**/*.json", recursive=True))

              for path in file_paths:
                  norm_path = path.replace("\\", "/")
                  parts = Path(norm_path).parts
                  if any(segment in parts for segment in [".github", ".git", "node_modules", ".kiro"]):
                      continue
                  if norm_path.endswith("master_mcq_arena.json"):
                      continue

                  try:
                      with open(path, "r", encoding="utf-8") as f:
                          data = json.load(f)
                  except Exception as e:
                      print(f"Skipping unparseable file {path}: {e}")
                      continue

                  if isinstance(data, dict):
                      data = data.get("questions", [])
                  if not isinstance(data, list):
                      continue

                  for item in data:
                      if not isinstance(item, dict):
                          continue

                      options = item.get("options", {})
                      if not isinstance(options, dict):
                          continue
                      if set(options.keys()) != {"A", "B", "C", "D"}:
                          continue

                      normalized_options = {k: str(options[k]).strip() for k in ["A", "B", "C", "D"]}
                      if any(not v for v in normalized_options.values()):
                          continue
                      lowered_values = [v.lower() for v in normalized_options.values()]
                      if len(set(lowered_values)) != 4:
                          continue

                      correct_ans = str(item.get("answer", "")).strip().upper()
                      if correct_ans not in {"A", "B", "C", "D"}:
                          continue

                      item_id = item.get("id")
                      dedupe_key = (
                          str(item_id).strip() if item_id is not None else "",
                          str(item.get("question", "")).strip().lower(),
                          tuple(lowered_values),
                      )
                      if dedupe_key in seen:
                          continue
                      seen.add(dedupe_key)

                      clean_item = dict(item)
                      clean_item["answer"] = correct_ans
                      clean_item["options"] = normalized_options
                      compiled_questions.append(clean_item)

              return compiled_questions


          SYSTEM_INSTRUCTION = (
              "You are a senior surgical educator. Process ALL provided questions and return a single, valid JSON array. "
              "CRITICAL: Return ONLY raw valid JSON text matching the schema. No chat commentary. No markdown code blocks.\n\n"
              "SCHEMA FORMAT REQ:\n"
              "{\n"
              "  \"id\": \"<HEX_ID>\", \"specialty\": \"<SPECIALTY>\", \"topic\": \"<TOPIC>\", \"question\": \"<STEM>\",\n"
              "  \"options\": {\"A\": \"text\", \"B\": \"text\", \"C\": \"text\", \"D\": \"text\"},\n"
              "  \"answer\": \"<LETTER>\",\n"
              "  \"explanation\": {\n"
              "    \"correct\": \"### ⚙️ Surgical Mechanism\\n* **Pathophysiological pathway:** [Deep anatomy/pathophysiology under 10 words, bold starting term]\\n\\n### ⚡ Clinical Execution\\n* **Management strategy:** [Clinical choices, short punchy bullets]\",\n"
              "    \"A\": \"**[Option A Assessment]:** [Reasoning, short and concise]\",\n"
              "    \"B\": \"**[Option B Assessment]:** [Reasoning, short and concise]\",\n"
              "    \"C\": \"**[Option C Assessment]:** [Reasoning, short and concise]\",\n"
              "    \"D\": \"**[Option D Assessment]:** [Reasoning, short and concise]\", \"E\": \"\"\n"
              "  },\n"
              "  \"sharp_debrief\": {\n"
              "    \"S_set_the_stage\": \"### 🎯 S (Set the Stage)\\n* **Verdict:** Correct option is **[Correct Letter]**.\\n* **The Pivot:** [Crux statement under 10 words, bold starting term]\",\n"
              "    \"H_highlight_excellence\": \"### 🚀 H (Highlight Excellence)\\n* **Core Concept:** [Gold standard reason, short bolded fragment]\",\n"
              "    \"A_address_the_gaps\": \"### ❌ A (Address the Gaps)\\n* **Option A (Incorrect):** [Reasoning under 10 words, bold start]\\n* **Option B (Incorrect):** [Reasoning under 10 words, bold start]\\n* **Option C (Incorrect):** [Reasoning under 10 words, bold start]\\n* **Option D (Incorrect):** [Reasoning under 10 words, bold start]\",\n"
              "    \"R_review_learning_points\": \"### 📚 R (Review Learning Points)\\n* **Conceptual Overview:** [Summary sentence].\\n\\n#### 📊 Management Framework\\n| Variable | Clinical Triggers | Immediate Intervention |\\n| :--- | :--- | :--- |\\n| **Row** | • Criteria 1<br>• Criteria 2 | • Action 1<br>• Action 2 |\",\n"
              "    \"P_plan_for_improvement\": \"### 💡 P (Plan for Improvement)\\n* **The Board Pearl:** *[Key takeaway in italics]*\\n\\n#### 🔧 Surgical Action Checklist\\n1. 🟥 **Step 1:** [Step text]\\n2. 🟨 **Step 2:** [Step text]\"\n"
              "  },\n"
              "  \"supplementary_callouts\": {\n"
              "    \"guideline\": \"### 📋 Guideline Reference\\n* [Guideline citation, short]\",\n"
              "    \"takeaway\": \"### 🔑 Core Takeaway\\n* **[High-Yield Point]:** [One sentence takeaway]\",\n"
              "    \"visualization\": \"### 👁️ Operative Visualization\\n* **Field View:** [Anatomy description]\"\n"
              "  },\n"
              "  \"discrepancy_flag\": \"### ⚠️ CRITICAL FLAG\\n* [Empty if clean or statement of missing data]\"\n"
              "}\n"
              "CRITICAL RULES:\n"
              "1. Bullets must use short sentence fragments under 10 words.\n"
              "2. Always bold (** key term **) the beginning of a point.\n"
              "3. Construct a standard Markdown table using | and <br> within cell items inside R_review_learning_points."
          )


          def clean_json_string(raw_text):
              cleaned = raw_text.strip()
              cleaned = re.sub(r"^```json\s*|```$", "", cleaned, flags=re.MULTILINE).strip()
              start = cleaned.find("[")
              end = cleaned.rfind("]")
              if start != -1 and end != -1 and end >= start:
                  cleaned = cleaned[start : end + 1]
              return cleaned


          def try_gemini(payload_text, key):
              print("Attempting processing via Google Gemini...")
              url = (
                  "https://generativelanguage.googleapis.com/v1beta/models/"
                  f"gemini-2.0-flash:generateContent?key={key}"
              )
              body = {
                  "contents": [{"parts": [{"text": payload_text}]}],
                  "generationConfig": {"temperature": 0.1},
              }
              res = requests.post(
                  url,
                  json=body,
                  headers={"Content-Type": "application/json"},
                  timeout=LLM_TIMEOUT_SECONDS,
              )
              if res.status_code == 200:
                  return clean_json_string(res.json()["candidates"][0]["content"]["parts"][0]["text"])
              raise RuntimeError(f"Gemini HTTP {res.status_code}: {res.text}")


          def try_groq(payload_text, key):
              print("Attempting processing via Groq Cloud...")
              url = "https://api.groq.com/openai/v1/chat/completions"
              headers = {"Authorization": f"Bearer {key}", "Content-Type": "application/json"}
              data = {
                  "model": "llama-3.3-70b-versatile",
                  "messages": [
                      {"role": "system", "content": "You are a JSON-only automation server. Output valid JSON arrays only."},
                      {"role": "user", "content": payload_text},
                  ],
                  "temperature": 0.1,
              }
              res = requests.post(url, json=data, headers=headers, timeout=LLM_TIMEOUT_SECONDS)
              if res.status_code == 200:
                  return clean_json_string(res.json()["choices"][0]["message"]["content"])
              raise RuntimeError(f"Groq HTTP {res.status_code}: {res.text}")


          def process_with_failover(sanitized_batch):
              final_output = []
              prompt_payload = (
                  f"{SYSTEM_INSTRUCTION}\n\nHere is the raw input batch of questions to process:\n"
              )

              providers = [
                  {"name": "Gemini", "key": os.environ.get("GEMINI_KEY"), "func": try_gemini},
                  {"name": "Groq", "key": os.environ.get("GROQ_KEY"), "func": try_groq},
              ]

              for start in range(0, len(sanitized_batch), CHUNK_SIZE):
                  chunk = sanitized_batch[start : start + CHUNK_SIZE]
                  chunk_prompt = prompt_payload + json.dumps(chunk, ensure_ascii=False)
                  chunk_processed = None

                  for provider in providers:
                      if not provider["key"]:
                          print(f"Skipping {provider['name']}: missing API key secret.")
                          continue
                      try:
                          raw_output = provider["func"](chunk_prompt, provider["key"])
                          validated_json = json.loads(raw_output)
                          if not isinstance(validated_json, list):
                              raise RuntimeError(f"{provider['name']} output is not a JSON array.")
                          print(
                              f"Chunk {start + 1}-{start + len(chunk)} succeeded with {provider['name']}."
                          )
                          chunk_processed = validated_json
                          break
                      except Exception as err:
                          print(f"Warning: {provider['name']} failed: {err}")

                  if chunk_processed is None:
                      print(
                          f"Chunk {start + 1}-{start + len(chunk)} failed on all providers. "
                          "Using sanitized chunk."
                      )
                      # Preserve workflow continuity and data progress when providers are
                      # temporarily unavailable; this chunk remains valid but non-enriched.
                      chunk_processed = chunk

                  final_output.extend(chunk_processed)

              return final_output


          def main():
              print("Initiating workspace MCQ extraction sweep...")
              sanitized_batch = load_and_sanitize_mcqs()
              print(f"Pre-processing completed: {len(sanitized_batch)} valid questions.")

              if not sanitized_batch:
                  print("No valid JSON questions found matching criteria. Exiting cleanly.")
                  return 0

              final_data = process_with_failover(sanitized_batch)

              with OUTPUT_FILE.open("w", encoding="utf-8") as out_file:
                  json.dump(final_data, out_file, indent=2, ensure_ascii=False)
              print(f"Master file compilation complete: {OUTPUT_FILE}")
              return 0


          if __name__ == "__main__":
              sys.exit(main())
          EOF

      - name: Upload compiled MCQ artifact
        if: always() && hashFiles(format('{0}', env.OUTPUT_FILE)) != ''
        uses: actions/upload-artifact@v4
        with:
          name: master-mcq-arena
          path: ${{ env.OUTPUT_FILE }}
