<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SIH | MCQ Harvest Portal (V2.2)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; }
        pre { background: #000; padding: 20px; border-radius: 10px; overflow: auto; max-height: 400px; color: #10b981; }
        .btn { background: #6366f1; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
  <link rel="icon" type="image/png" href="assets/images/Surgical_Insight_Hub_Logo.png">
</head>
<body>
    <div class="container">
        <h1>Harvest Portal (Llama-3-8B)</h1>
        <p id="status">Ready to process batch.</p>
        <button id="start-btn" class="btn">Start Processing</button>
        <h3>Extracted JSON:</h3>
        <pre id="output">[]</pre>
    </div>

    <script src="scratch/current_batch.js"></script>
    <script>
        const API_KEY = 'e13a5f9ecd8487a2389c75f56b091e16';
        // Switching to 8B to avoid credit gate
        const MODEL_ID = 'meta-llama/Meta-Llama-3-8B-Instruct';
        
        async function start() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            const startBtn = document.getElementById('start-btn');
            
            startBtn.disabled = true;
            status.innerText = 'Processing with ByteZ 8B...';
            
            const prompt = `Extract surgical MCQs from this text into JSON. Return ONLY the JSON array.
            Text: ${window.CURRENT_BATCH_TEXT}`;

            try {
                // Testing the unified 'run' endpoint
                const res = await fetch(`https://api.bytez.com/models/v2/${MODEL_ID}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: prompt }],
                        params: { max_new_tokens: 1024 }
                    })
                });

                if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
                
                const data = await res.json();
                output.innerText = data.output;
                status.innerText = 'COMPLETE.';
            } catch (err) {
                status.innerText = 'Error: ' + err.message;
            }
        }
        document.getElementById('start-btn').addEventListener('click', start);
    </script>
<script src="js/navigation.js"></script>
</body>
</html>
